name: Update Bump PR Tracker

# Maintains a single pinned issue in this repo that lists open
# "Update ESPHome to X.Y.Z" PRs across the firmware repos in repos.json.

on:
  workflow_run:
    workflows: ["Update ESPHome Version in Firmware Repos"]
    types:
      - completed
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: bump-pr-tracker
  cancel-in-progress: false

jobs:
  update-tracker:
    name: Update tracker issue
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build downstream repo list
        id: repo-list
        run: |
          REPOS=$(jq -r '[.[].repo] | join(",")' repos.json)
          echo "repos=$REPOS" >> "$GITHUB_OUTPUT"

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ESPHOME_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.ESPHOME_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.repo-list.outputs.repos }}
          permission-pull-requests: read

      - name: Update tracker issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DOWNSTREAM_TOKEN: ${{ steps.generate-token.outputs.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');

            const repos = JSON.parse(fs.readFileSync('repos.json', 'utf8'));
            const owner = context.repo.owner;
            const trackerLabel = 'version-bump-tracker';
            const trackerTitle = 'Open ESPHome firmware version bump PRs';
            const headRef = 'esphome-version-update';

            // Ensure tracker label exists.
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: trackerLabel,
                color: 'fbca04',
                description: 'Tracking issue for open downstream version bump PRs',
              });
            } catch (err) {
              if (err.status !== 422) throw err;
            }

            // Default `github` Octokit is bound to GITHUB_TOKEN (this repo only); use
            // raw fetch with the app token for downstream PR reads.
            const downstreamToken = process.env.DOWNSTREAM_TOKEN;
            const openPrs = [];
            const noPr = [];
            for (const entry of repos) {
              const repo = entry.repo;
              const url = `https://api.github.com/repos/${owner}/${repo}/pulls?state=open&head=${owner}:${headRef}&per_page=5`;
              const resp = await fetch(url, {
                headers: {
                  Authorization: `Bearer ${downstreamToken}`,
                  Accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
              });
              if (!resp.ok) {
                const text = await resp.text();
                throw new Error(`Failed to list PRs for ${owner}/${repo}: ${resp.status} ${text}`);
              }
              const prs = await resp.json();
              if (prs.length === 0) {
                noPr.push(`${owner}/${repo}`);
              } else {
                for (const pr of prs) {
                  openPrs.push({
                    repo: `${owner}/${repo}`,
                    title: pr.title,
                    url: pr.html_url,
                  });
                }
              }
            }

            const now = new Date().toISOString();
            const runUrl = process.env.RUN_URL;
            let body = '## Open ESPHome firmware version bump PRs\n\n';
            body += '<!-- managed by .github/workflows/track-bump-prs.yml — do not edit manually -->\n\n';
            if (openPrs.length === 0) {
              body += '*All firmware repos are up to date — no open version-bump PRs.*\n\n';
            } else {
              for (const pr of openPrs) {
                body += `- [ ] [${pr.repo} — ${pr.title}](${pr.url})\n`;
              }
              body += '\n';
              if (noPr.length > 0) {
                body += `_No open PR for: ${noPr.join(', ')}_\n\n`;
              }
            }
            body += `_Last updated: ${now} ([run](${runUrl}))_\n`;

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: trackerLabel,
              state: 'open',
              per_page: 5,
            });

            let issueNodeId;
            let issueNumber;
            if (existing.length > 0) {
              const issue = existing[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body,
              });
              issueNodeId = issue.node_id;
              issueNumber = issue.number;
              core.info(`Updated tracker issue #${issue.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: trackerTitle,
                body,
                labels: [trackerLabel],
              });
              issueNodeId = created.node_id;
              issueNumber = created.number;
              core.info(`Created tracker issue #${created.number}`);
            }

            try {
              await github.graphql(
                'mutation Pin($id: ID!) { pinIssue(input: { issueId: $id }) { issue { id } } }',
                { id: issueNodeId },
              );
              core.info(`Pinned issue #${issueNumber}`);
            } catch (err) {
              const msg = String(err && err.message || err);
              if (/already pinned/i.test(msg)) {
                core.info(`Issue #${issueNumber} already pinned`);
              } else {
                core.warning(`Failed to pin issue #${issueNumber}: ${msg}`);
              }
            }
