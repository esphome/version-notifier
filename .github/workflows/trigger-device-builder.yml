name: Trigger ESPHome Device Builder Catalog Sync

# Subscribes to the Notify workflow (or runs manually) and dispatches
# sync-on-esphome-release.yml in esphome/device-builder so its component and
# board catalogs refresh as soon as a new ESPHome release ships.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "ESPHome version (e.g., 2024.1.0)"
        required: true
        type: string
  workflow_run:
    workflows: ["Notify"]
    types:
      - completed

permissions:
  contents: read  # actions/download-artifact reads the Notify workflow's artifact
  actions: read   # actions/download-artifact lists artifacts on the source run

jobs:
  trigger:
    name: Trigger device-builder catalog sync
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download version artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: esphome-version
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve version
        id: version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="$(cat esphome_version.txt)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          client-id: ${{ vars.ESPHOME_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.ESPHOME_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: device-builder
          permission-actions: write  # actions.createWorkflowDispatch on the target repo (only API call made with this token)

      - name: Trigger Workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: "esphome",
              repo: "device-builder",
              workflow_id: "sync-on-esphome-release.yml",
              ref: "main",
              inputs: {
                version: process.env.VERSION,
              },
            });
